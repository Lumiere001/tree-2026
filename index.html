<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>가계도 · 연명부</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<style>
  :root {
    --bg: #1e1e1e;
    --bg-2: #262626;
    --panel: #2a2a2a;
    --border: #3a3a3a;
    --text: #dcddde;
    --text-dim: #999;
    --text-muted: #666;
    --accent: #a277ff;        /* obsidian purple */
    --accent-2: #7b5cff;
    --node: #b3b3b3;
    --node-hover: #ffffff;
    --link: #3d3d3d;
    --link-hover: #6b6b6b;
    /* highlight colors */
    --ancestor: #5fb3ff;       /* upward — cool blue */
    --descendant: #ffb86c;     /* downward — warm orange */
    --self: #a277ff;
    --staff: #ff8ab4;
    --external: #777;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-size: 14px;
  }

  /* ====== Login overlay ====== */
  #login {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  #login .box {
    width: min(360px, 92vw);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 28px 26px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  #login h1 {
    margin: 0 0 6px 0; font-size: 18px; font-weight: 600;
    color: var(--text); letter-spacing: 0.2px;
  }
  #login .sub {
    color: var(--text-dim); font-size: 12.5px; margin-bottom: 18px;
    line-height: 1.55;
  }
  #login input[type=password] {
    width: 100%; padding: 11px 13px; font-size: 14px;
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    outline: none; transition: border-color 0.15s;
  }
  #login input[type=password]:focus { border-color: var(--accent); }
  #login button {
    width: 100%; margin-top: 10px; padding: 10px;
    background: var(--accent); color: #fff; font-weight: 600;
    border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; transition: background 0.15s;
  }
  #login button:hover { background: var(--accent-2); }
  #login button:disabled { opacity: 0.5; cursor: wait; }
  #login .err {
    color: #ff6b8a; font-size: 12.5px; margin-top: 10px; min-height: 1em;
  }
  #login .lock { font-size: 28px; margin-bottom: 6px; }

  /* ====== Main app ====== */
  #app { display: none; height: 100%; position: relative; }
  #app.ready { display: block; }

  #graph { width: 100%; height: 100%; cursor: grab; background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(162,119,255,0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(95,179,255,0.03) 0%, transparent 40%);
  }
  #graph:active { cursor: grabbing; }

  /* ====== Top bar ====== */
  #topbar {
    position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; gap: 10px; align-items: center; z-index: 10;
    pointer-events: none;
  }
  #topbar > * { pointer-events: auto; }
  #search {
    flex: 0 1 280px;
    padding: 8px 12px; font-size: 13px;
    background: rgba(42,42,42,0.92); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    outline: none; backdrop-filter: blur(6px);
  }
  #search:focus { border-color: var(--accent); }
  #stats {
    margin-left: auto; padding: 6px 12px;
    background: rgba(42,42,42,0.85); border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; color: var(--text-dim);
    backdrop-filter: blur(6px);
  }

  /* ====== Legend ====== */
  #legend {
    position: absolute; bottom: 14px; left: 14px; z-index: 10;
    background: rgba(42,42,42,0.92); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; font-size: 12px;
    backdrop-filter: blur(6px); line-height: 1.7;
  }
  #legend .row { display: flex; align-items: center; gap: 8px; }
  #legend .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #legend .title { font-weight: 600; color: var(--text); margin-bottom: 4px; }

  /* ====== Detail panel ====== */
  #detail {
    position: absolute; top: 64px; right: 14px; width: 260px; z-index: 10;
    background: rgba(42,42,42,0.95); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; font-size: 13px;
    backdrop-filter: blur(8px); display: none; line-height: 1.55;
  }
  #detail.show { display: block; }
  #detail h3 { margin: 0 0 8px 0; font-size: 16px; color: var(--text); }
  #detail .field { color: var(--text-dim); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
  #detail .val { color: var(--text); }
  #detail .close { position: absolute; top: 8px; right: 10px; cursor: pointer; color: var(--text-muted); font-size: 16px; user-select: none; }
  #detail .close:hover { color: var(--text); }
  #detail .lineage { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; }
  #detail .lineage .ancestors { color: var(--ancestor); }
  #detail .lineage .descendants { color: var(--descendant); }

  /* ====== Help button ====== */
  #help-btn {
    position: absolute; bottom: 14px; right: 14px; z-index: 10;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(42,42,42,0.92); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  #help-btn:hover { color: var(--text); border-color: var(--accent); }
  #help {
    position: absolute; bottom: 56px; right: 14px; z-index: 10;
    width: 260px; background: rgba(42,42,42,0.96); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; font-size: 12px;
    backdrop-filter: blur(8px); display: none; line-height: 1.6;
    color: var(--text-dim);
  }
  #help.show { display: block; }
  #help b { color: var(--text); }

  /* ====== Graph styling ====== */
  .link { stroke: var(--link); stroke-width: 1.2px; transition: stroke 0.15s, stroke-opacity 0.15s, stroke-width 0.15s; }
  .link.dim { stroke-opacity: 0.15; }
  .link.up   { stroke: var(--ancestor); stroke-width: 2px; stroke-opacity: 0.95; }
  .link.down { stroke: var(--descendant); stroke-width: 2px; stroke-opacity: 0.95; }

  .node circle {
    stroke: #1e1e1e; stroke-width: 1.5px;
    cursor: pointer;
    transition: r 0.12s, fill 0.15s, stroke 0.15s, opacity 0.15s;
  }
  .node text {
    fill: var(--text);
    font-size: 11px;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: hanging;
    paint-order: stroke;
    stroke: rgba(30,30,30,0.85);
    stroke-width: 3px;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: fill 0.15s, opacity 0.15s, font-weight 0.15s;
  }
  .node.dim circle { opacity: 0.18; }
  .node.dim text { opacity: 0.22; }
  .node.up    circle { fill: var(--ancestor) !important; stroke: var(--ancestor); }
  .node.up    text   { fill: var(--ancestor); font-weight: 600; }
  .node.down  circle { fill: var(--descendant) !important; stroke: var(--descendant); }
  .node.down  text   { fill: var(--descendant); font-weight: 600; }
  .node.self  circle { fill: var(--self) !important; stroke: #fff; stroke-width: 2.5px; }
  .node.self  text   { fill: #fff; font-weight: 700; }
  .node.match circle { stroke: #ffd166; stroke-width: 2.5px; }
  .node.match text   { fill: #ffd166; font-weight: 600; }
</style>
</head>

    <div class="title" style="margin-top:8px;">호버 시</div>
    <div class="row"><span class="dot" style="background:var(--ancestor)"></span>위쪽 (조상)</div>
    <div class="row"><span class="dot" style="background:var(--descendant)"></span>아래쪽 (후손)</div>
  </div>

  <button id="help-btn" title="도움말">?</button>
  <div id="help">
    <b>조작법</b><br>
    · <b>호버/탭</b>: 위·아래 계보 강조<br>
    · <b>클릭</b>: 상세정보 보기<br>
    · <b>드래그</b>: 노드 이동<br>
    · <b>휠/핀치</b>: 줌<br>
    · <b>빈 곳 드래그</b>: 화면 이동<br>
    · <b>검색</b>: 이름 일부 입력<br>
    · <b>ESC</b>: 선택 해제
  </div>
</div>

<script>
// ====================== DECRYPTION ======================
const enc = JSON.parse(document.getElementById('payload').textContent);

function b64decode(s) {
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password) {
  const salt = b64decode(enc.salt);
  const iv   = b64decode(enc.iv);
  const ct   = b64decode(enc.ct);
  const iters = enc.iters;

  const baseKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password),
    {name:'PBKDF2'}, false, ['deriveKey']
  );
  const aesKey = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations: iters, hash: 'SHA-256'},
    baseKey,
    {name:'AES-GCM', length: 256},
    false, ['decrypt']
  );
  const ptBuf = await crypto.subtle.decrypt(
    {name:'AES-GCM', iv}, aesKey, ct
  );
  return JSON.parse(new TextDecoder().decode(ptBuf));
}

// ====================== LOGIN ======================
const loginForm = document.getElementById('login-form');
const pwInput = document.getElementById('pw');
const errEl = document.getElementById('login-err');
const unlockBtn = document.getElementById('unlock-btn');

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.textContent = '';
  unlockBtn.disabled = true;
  unlockBtn.textContent = '복호화 중…';
  try {
    const data = await decrypt(pwInput.value);
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').classList.add('ready');
    initGraph(data);
  } catch (e) {
    errEl.textContent = '비밀번호가 올바르지 않습니다.';
    unlockBtn.disabled = false;
    unlockBtn.textContent = '열기';
    pwInput.select();
  }
});

// ====================== GRAPH ======================
function initGraph(data) {
  const svg = d3.select('#graph');
  const width  = window.innerWidth;
  const height = window.innerHeight;
  svg.attr('viewBox', [0, 0, width, height]);

  const g = svg.append('g');

  // Zoom/pan
  const zoom = d3.zoom()
    .scaleExtent([0.15, 6])
    .on('zoom', (ev) => g.attr('transform', ev.transform));
  svg.call(zoom);

  // ---- adjacency
  const nodeById = new Map(data.nodes.map(n => [n.id, n]));
  const parentOf = new Map(); // child -> parent id
  const childrenOf = new Map(); // parent -> [child ids]
  data.nodes.forEach(n => childrenOf.set(n.id, []));
  data.edges.forEach(e => {
    parentOf.set(e.target, e.source);
    childrenOf.get(e.source).push(e.target);
  });

  function ancestorsOf(id) {
    const set = new Set();
    let cur = parentOf.get(id);
    while (cur && !set.has(cur)) { set.add(cur); cur = parentOf.get(cur); }
    return set;
  }
  function descendantsOf(id) {
    const set = new Set();
    const stack = [...(childrenOf.get(id) || [])];
    while (stack.length) {
      const c = stack.pop();
      if (set.has(c)) continue;
      set.add(c);
      for (const cc of (childrenOf.get(c) || [])) stack.push(cc);
    }
    return set;
  }

  // ---- stats
  const nMembers = data.nodes.filter(n => n.type === 'member').length;
  document.getElementById('stats').textContent =
    `노드 ${data.nodes.length} · 순원/순장 ${nMembers} · 연결 ${data.edges.length}`;

  // ---- D3 force
  const links = data.edges.map(e => ({source: e.source, target: e.target}));
  const nodes = data.nodes.map(n => ({...n}));

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(48).strength(0.7))
    .force('charge', d3.forceManyBody().strength(-110))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + 4))
    .force('x', d3.forceX(width/2).strength(0.03))
    .force('y', d3.forceY(height/2).strength(0.03));

  function nodeRadius(d) {
    const nKids = (childrenOf.get(d.id) || []).length;
    return 4 + Math.min(8, Math.sqrt(nKids) * 2.2);
  }

  function nodeFill(d) {
    if (d.type === 'staff')    return 'var(--staff)';
    if (d.type === 'external') return 'var(--external)';
    return 'var(--node)';
  }

  // links
  const linkSel = g.append('g').attr('class','links')
    .selectAll('line').data(links).join('line').attr('class','link');

  // nodes
  const nodeSel = g.append('g').attr('class','nodes')
    .selectAll('g').data(nodes).join('g').attr('class','node');

  nodeSel.append('circle')
    .attr('r', nodeRadius)
    .attr('fill', nodeFill);

  nodeSel.append('text')
    .attr('y', d => nodeRadius(d) + 3)
    .text(d => d.name);

  // drag
  nodeSel.call(
    d3.drag()
      .on('start', (ev,d) => { if(!ev.active) sim.alphaTarget(0.25).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
      .on('end',   (ev,d) => { if(!ev.active) sim.alphaTarget(0); /* keep pinned: comment out next 2 lines for sticky */ d.fx=null; d.fy=null; })
  );

  // hover/touch highlight
  let pinnedId = null;
  function highlight(id) {
    const target = id || pinnedId;
    if (!target) {
      nodeSel.classed('dim',false).classed('up',false).classed('down',false).classed('self',false);
      linkSel.classed('dim',false).classed('up',false).classed('down',false);
      return;
    }
    const ups = ancestorsOf(target);
    const dns = descendantsOf(target);
    nodeSel
      .classed('self', d => d.id === target)
      .classed('up',   d => ups.has(d.id))
      .classed('down', d => dns.has(d.id))
      .classed('dim',  d => d.id !== target && !ups.has(d.id) && !dns.has(d.id));
    linkSel
      .classed('up',   l => (ups.has(l.source.id || l.source) && (l.target.id||l.target) === target) || (ups.has(l.source.id||l.source) && ups.has(l.target.id||l.target)))
      .classed('down', l => (dns.has(l.target.id || l.target) && (l.source.id||l.source) === target) || (dns.has(l.source.id||l.source) && dns.has(l.target.id||l.target)))
      .classed('dim',  l => {
        const s = l.source.id||l.source, t = l.target.id||l.target;
        const onUp   = (s===target && ups.has(t)) || (t===target && ups.has(s)) || (ups.has(s) && ups.has(t));
        const onDown = (s===target && dns.has(t)) || (t===target && dns.has(s)) || (dns.has(s) && dns.has(t));
        return !onUp && !onDown;
      });
  }

  nodeSel
    .on('mouseenter', (ev,d) => { if(!pinnedId) highlight(d.id); })
    .on('mouseleave', ()     => { if(!pinnedId) highlight(null); })
    .on('click', (ev,d) => {
      pinnedId = (pinnedId === d.id) ? null : d.id;
      highlight(pinnedId);
      showDetail(pinnedId ? d : null);
      ev.stopPropagation();
    })
    .on('touchstart', (ev,d) => {
      pinnedId = d.id;
      highlight(pinnedId);
      showDetail(d);
    }, {passive:true});

  svg.on('click', () => {
    pinnedId = null; highlight(null); showDetail(null);
  });

  // detail panel
  const detail = document.getElementById('detail');
  function showDetail(d) {
    if (!d) { detail.classList.remove('show'); return; }
    document.getElementById('d-name').textContent = d.name;
    document.getElementById('d-role').textContent = d.role || '';
    document.getElementById('d-dept').textContent = d.dept || '—';
    document.getElementById('d-year').textContent = d.year || '—';
    document.getElementById('d-college').textContent = d.college || '—';
    const ups = [...ancestorsOf(d.id)].map(id => nodeById.get(id).name);
    const dns = [...descendantsOf(d.id)].map(id => nodeById.get(id).name);
    document.getElementById('d-lineage').innerHTML =
      `<div class="ancestors">↑ 위쪽 ${ups.length}명${ups.length?': '+ups.join(' → '):''}</div>` +
      `<div class="descendants" style="margin-top:4px;">↓ 아래쪽 ${dns.length}명</div>`;
    detail.classList.add('show');
  }
  document.getElementById('detail-close').onclick = () => {
    pinnedId = null; highlight(null); showDetail(null);
  };

  // search
  const searchEl = document.getElementById('search');
  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim();
    nodeSel.classed('match', false);
    if (!q) return;
    const matches = nodes.filter(n => n.name.includes(q));
    nodeSel.filter(d => matches.includes(d)).classed('match', true);
    if (matches.length === 1) {
      const m = matches[0];
      // center on match
      const cx = width/2 - m.x, cy = height/2 - m.y;
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(cx, cy).scale(1.2));
    }
  });

  // ESC clears
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      pinnedId = null; highlight(null); showDetail(null);
      searchEl.value = ''; nodeSel.classed('match', false);
    }
  });

  // help toggle
  const helpBtn = document.getElementById('help-btn');
  const helpEl  = document.getElementById('help');
  helpBtn.onclick = (e) => { helpEl.classList.toggle('show'); e.stopPropagation(); };
  document.addEventListener('click', () => helpEl.classList.remove('show'));

  // tick
  sim.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // resize
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    svg.attr('viewBox', [0, 0, w, h]);
    sim.force('center', d3.forceCenter(w/2, h/2));
    sim.alpha(0.3).restart();
  });
}
</script>
</body>
</html>
